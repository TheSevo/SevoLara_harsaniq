<!-- Replace your current <form> tag with this. 
     Replace 'YOUR_FORM_ID' with the code Formspree gives you. -->
<form id="rsvp-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <div>
        <label for="name">Nom(s) complet(s)</label>
        <!-- Ensure the name attributes are set correctly so they show up in your email -->
        <input type="text" id="name" name="Nom de l'invité" placeholder="Prénom Nom" required>
    </div>
    
    <div>
        <label for="email">Votre adresse mail</label>
        <input type="email" id="email" name="Email" placeholder="votre@email.com" required>
    </div>

    <div>
        <label for="attendance">Serez-vous présents ?</label>
        <select id="attendance" name="Présence" required>
            <option value="" disabled selected>Choisissez une option...</option>
            <option value="Oui">Avec grand plaisir !</option>
            <option value="Non">Malheureusement absent</option>
        </select>
    </div>

    <button type="submit">Envoyer réponse</button>
</form>
